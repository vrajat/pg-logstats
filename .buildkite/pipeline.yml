steps:
  - label: ":rust: format"
    key: "format"
    agents:
      queue: "getafix"
    command:
      - ".buildkite/scripts/bootstrap.sh"
      - "mise --no-config exec rust@stable -- make fmt-check"

  - label: ":rust: test"
    key: "test"
    depends_on: "format"
    agents:
      queue: "getafix"
    command:
      - ".buildkite/scripts/bootstrap.sh"
      - "mise --no-config exec rust@stable -- make test"

  - label: ":rust: clippy"
    key: "clippy"
    depends_on: "format"
    agents:
      queue: "getafix"
    command:
      - ".buildkite/scripts/bootstrap.sh"
      - "mise --no-config exec rust@stable -- make clippy"

  - label: ":package: package smoke"
    key: "package-smoke"
    depends_on: "format"
    agents:
      queue: "getafix"
    command:
      - ".buildkite/scripts/bootstrap.sh"
      - "mise --no-config exec rust@stable -- make package-smoke"
